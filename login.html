<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1978e5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>StokPintar - Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<!-- Auth Container -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header/TopAppBar Styled Branding -->
<div class="flex flex-col items-center p-8 pb-4 text-center">
<div class="bg-primary/10 p-3 rounded-xl mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="inventory_2">inventory_2</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">StokPintar</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2">AI-Driven Inventory Intelligence</p>
</div>
<div class="px-8 pt-4 pb-2">
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Welcome Back</h1>
<p class="text-slate-600 dark:text-slate-400">Please enter your details to sign in.</p>
</div>
<!-- Login Form -->
<form action="#" class="p-8 pt-4 space-y-5" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember-me">
                    Remember me for 30 days
                </label>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
                Sign In
                <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="px-8 pb-4">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-2 text-slate-500">Or continue with</span>
</div>
</div>
</div>
<!-- Social Logins -->
<div class="px-8 grid grid-cols-2 gap-4 pb-8">
<button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google company logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWGWOswdgR1ZAitK9lBJM-mwMCbjsdVcW_cvV4gteqxxe4QZ7QR8Ew4dh0l7GxRhPC8qKTpbLtw_1tVwc0PDK2ORCMEIXcRUpZ3fiHOOu3LLyzG6DKispc7jVcWKnCoUzNar1Gj49-apm-VA0zlyOHOU8ORovAItLJbm9g17jVHupg75KenwGnmKLaS4HSD7eflIRaJ893aszsxNrG74r5E7pDjN0r2qlkqR02Wzd-oA_1t1G6AsD-i9tMEEcskOONFRRcIB-wsKE"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-white">business</span>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">SSO</span>
</button>
</div>
<!-- Footer Footer -->
<div class="bg-slate-50 dark:bg-slate-800/50 p-6 text-center border-t border-slate-100 dark:border-slate-800">
<p class="text-sm text-slate-600 dark:text-slate-400">
                New to StokPintar? 
                <a class="font-bold text-primary hover:underline" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Decorative Elements (Optional for visual appeal) -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden opacity-50 dark:opacity-20 pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-1/4 right-0 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
</div>
</body></html>
